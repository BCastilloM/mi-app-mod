version: "3.9"

services:
  mysql:
    image: mysql:8.0
    container_name: acme_mysql
    restart: unless-stopped
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: ""
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_DATABASE: acme
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      # Scripts de inicialización: se ejecutan solo la primera vez (BD vacía)
      - ./backend-server/acme.sql:/docker-entrypoint-initdb.d/01-acme.sql
      - ./backend-server/usuarios.sql:/docker-entrypoint-initdb.d/02-usuarios.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - acme_net

  backend:
    build:
      context: ./backend-server
    container_name: acme_backend
    restart: unless-stopped
    env_file:
      - ./backend-server/.env
    environment:
      DB_HOST: mysql
      DB_USER: root
      DB_PASSWORD: ""
      DB_NAME: acme
    ports:
      - "3000:3000"
    volumes:
      - ./backend-server/uploads:/app/uploads
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - acme_net

  frontend:
    build:
      context: ./mi-app-mod
    container_name: acme_frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend
    networks:
      - acme_net

networks:
  acme_net:
    driver: bridge

volumes:
  mysql_data:
