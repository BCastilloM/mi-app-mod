<div class="dashboard-container">
  <h2 class="dashboard-title">Dashboard de Productos</h2>
  <p class="dashboard-subtitle">Top 5 productos con mayor puntuación</p>

  <!-- Gráfico 1: Barras Horizontal -->
  <div class="chart-card">
    <h3>Gráfico de Barras Horizontal</h3>
    <ngx-charts-bar-horizontal
      [view]="view"
      [scheme]="colorScheme"
      [results]="saleData()"
      [gradient]="gradient"
      [xAxis]="showXAxis"
      [yAxis]="showYAxis"
      [legend]="showLegend"
      [legendTitle]="legendTitle"
      [showXAxisLabel]="showXAxisLabel"
      [showYAxisLabel]="showYAxisLabel"
      [xAxisLabel]="xAxisLabel"
      [yAxisLabel]="yAxisLabel">
    </ngx-charts-bar-horizontal>
  </div>

  <!-- Gráfico 2: Torta Simple -->
  <div class="chart-card">
    <h3>Gráfico de Torta Simple</h3>
    <ngx-charts-pie-chart
      [view]="view"
      [scheme]="colorScheme"
      [results]="saleData()"
      [legend]="showLegend"
      [legendTitle]="legendTitle">
    </ngx-charts-pie-chart>
  </div>

  <!-- Gráfico 3: Torta Avanzada -->
  <div class="chart-card">
    <h3>Gráfico de Torta Avanzada</h3>
    <ngx-charts-advanced-pie-chart
      [scheme]="colorScheme"
      [results]="saleData()"
      [gradient]="gradient">
    </ngx-charts-advanced-pie-chart>
  </div>
</div>
