<div class="container-fluid mt-3">
  <div class="row mb-3">
    <div class="col-md-2">Filtrar por:</div>
    <div class="col-md-4">
      <input type="text" class="form-control" [(ngModel)]="listFilter">
    </div>
    <div class="col-md-4">
      Filtrado por: {{ listFilter() }}
    </div>
    <div class="col-md-2">
      <button class="btn btn-success" (click)="crearProducto()">
        <i-bs name="plus-circle"></i-bs>
        Crear Producto
      </button>
    </div>
  </div>

  <app-product-list
    [products]="filteredProducts()"
    (productsChange)="productService.products.set($event)">
  </app-product-list>
</div>
